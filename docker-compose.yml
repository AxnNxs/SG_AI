services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: ia_postgres
    environment:
      POSTGRES_DB: ia_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  vllm:
    image: vllm/vllm-openai:latest
    container_name: ia_vllm
    runtime: nvidia
    volumes:
      # Mappiamo la cartella locale in modo che vLLM la veda come /app/model
      - ./.ai:/app/model
    environment:
      - HF_HUB_OFFLINE=1  # Disabilita completamente le chiamate internet
      - CUDA_VISIBLE_DEVICES=0 # Assicurati di puntare alla tua 4080
    command: >
      /app/model
      --quantization awq
      --max-model-len 8192
      --gpu-memory-utilization 0.7
      --enforce-eager
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"